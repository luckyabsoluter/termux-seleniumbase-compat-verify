name: Termux SeleniumBase CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run verification inside Termux Docker
        run: |
          docker run --rm \
            -v "$PWD:/app" \
            -w /app \
            termux/termux-docker:x86_64 \
            bash -lc "bash scripts/init_termux.sh && python scripts/verify_version.py"
