name: Termux SeleniumBase CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        termux_target:
          - image: termux/termux-docker:x86_64
            chromium_package: chromium
            seleniumbase_spec: seleniumbase
    name: Verify ${{ matrix.termux_target.chromium_package }} / ${{ matrix.termux_target.seleniumbase_spec }}
    env:
      TERMUX_IMAGE: ${{ matrix.termux_target.image }}
      TERMUX_CONTAINER_NAME: termux-seleniumbase-ci
      TERMUX_PROJECT_DIR: /data/termux-seleniumbase-compat-verify
      TERMUX_ARTIFACT_DIR: /data/termux-seleniumbase-compat-verify/artifacts
      HOST_ARTIFACT_DIR: artifacts
      CHROMIUM_PACKAGE_SPEC: ${{ matrix.termux_target.chromium_package }}
      SELENIUMBASE_SPEC: ${{ matrix.termux_target.seleniumbase_spec }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start Termux Docker container
        run: |
          docker run -d \
            --name "$TERMUX_CONTAINER_NAME" \
            -v "$PWD:/app" \
            -w /app \
            "$TERMUX_IMAGE" \
            bash -lc "while true; do sleep 3600; done"

      - name: Prepare writable project copy
        run: |
          docker exec \
            "$TERMUX_CONTAINER_NAME" \
            bash -lc "rm -rf \"$TERMUX_PROJECT_DIR\" && mkdir -p \"$TERMUX_PROJECT_DIR\" && cp -a /app/. \"$TERMUX_PROJECT_DIR\" && chown -R system:system \"$TERMUX_PROJECT_DIR\""

      - name: Initialize Termux environment
        run: |
          docker exec \
            -w "$TERMUX_PROJECT_DIR" \
            -e CHROMIUM_PACKAGE_SPEC="$CHROMIUM_PACKAGE_SPEC" \
            -e SELENIUMBASE_SPEC="$SELENIUMBASE_SPEC" \
            -e TERMUX_ARTIFACT_DIR="$TERMUX_ARTIFACT_DIR" \
            "$TERMUX_CONTAINER_NAME" \
            /entrypoint.sh bash -lc 'mkdir -p "$TERMUX_ARTIFACT_DIR"; bash scripts/init_termux.sh'

      - name: Verify SeleniumBase and Chromium compatibility
        run: |
          docker exec \
            -w "$TERMUX_PROJECT_DIR" \
            -e TERMUX_ARTIFACT_DIR="$TERMUX_ARTIFACT_DIR" \
            "$TERMUX_CONTAINER_NAME" \
            /entrypoint.sh bash -lc 'mkdir -p "$TERMUX_ARTIFACT_DIR"; python scripts/verify_version.py'

      - name: Collect diagnostics
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -Fxq "$TERMUX_CONTAINER_NAME"; then
            docker exec \
              -w "$TERMUX_PROJECT_DIR" \
              -e TERMUX_ARTIFACT_DIR="$TERMUX_ARTIFACT_DIR" \
              "$TERMUX_CONTAINER_NAME" \
              /entrypoint.sh bash -lc 'mkdir -p "$TERMUX_ARTIFACT_DIR"; python scripts/collect_env_snapshot.py --output "$TERMUX_ARTIFACT_DIR/env-snapshot.json" || true'
          fi

      - name: Copy diagnostics artifacts
        if: always()
        run: |
          mkdir -p "$HOST_ARTIFACT_DIR"
          if docker ps -a --format '{{.Names}}' | grep -Fxq "$TERMUX_CONTAINER_NAME"; then
            docker cp "$TERMUX_CONTAINER_NAME:$TERMUX_ARTIFACT_DIR/." "$HOST_ARTIFACT_DIR/" || true
          fi

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-diagnostics-${{ matrix.termux_target.chromium_package }}-${{ matrix.termux_target.seleniumbase_spec }}
          path: ${{ env.HOST_ARTIFACT_DIR }}
          if-no-files-found: warn

      - name: Remove Termux Docker container
        if: always()
        run: |
          docker rm -f "$TERMUX_CONTAINER_NAME"
