name: Termux SeleniumBase CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        termux_target:
          - ci_name: unmodified-seleniumbase
            image: termux/termux-docker:x86_64
            patches: '[]'
          - ci_name: seleniumbase-with-termux-python-psutil
            image: termux/termux-docker:x86_64
            patches: '["seleniumbase-with-termux-python-psutil", "seleniumbase_platform_shim"]'
          - ci_name: seleniumbase-4.48.4
            image: termux/termux-docker:x86_64
            patches: '["seleniumbase==4.48.4", "seleniumbase_platform_shim"]'
    name: Verify ${{ matrix.termux_target.ci_name }}
    env:
      TERMUX_IMAGE: ${{ matrix.termux_target.image }}
      TERMUX_CONTAINER_NAME: termux-seleniumbase-ci-${{ matrix.termux_target.ci_name }}
      TERMUX_PROJECT_DIR: /data/termux-seleniumbase-compat-verify
      TERMUX_ARTIFACT_DIR: /data/termux-seleniumbase-compat-verify/artifacts
      HOST_ARTIFACT_DIR: artifacts
      PATCHES_JSON: ${{ matrix.termux_target.patches }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start Termux Docker container
        run: |
          docker run -d \
            --name "$TERMUX_CONTAINER_NAME" \
            -v "$PWD:/app" \
            -w /app \
            "$TERMUX_IMAGE" \
            bash -lc "while true; do sleep 3600; done"

      - name: Prepare writable project copy
        run: |
          docker exec \
            "$TERMUX_CONTAINER_NAME" \
            bash -lc "rm -rf \"$TERMUX_PROJECT_DIR\" && mkdir -p \"$TERMUX_PROJECT_DIR\" && cp -a /app/. \"$TERMUX_PROJECT_DIR\" && chown -R system:system \"$TERMUX_PROJECT_DIR\""

      - name: Initialize Termux environment
        run: |  # We can't pass environment variables with `docker exec -e`, so we pass them inline
          docker exec \
            -w "$TERMUX_PROJECT_DIR" \
            "$TERMUX_CONTAINER_NAME" \
            /entrypoint.sh bash -lc "
              PATCHES_JSON='$PATCHES_JSON' \
              bash scripts/init_termux.sh"

      - name: Verify SeleniumBase and Chromium compatibility
        run: |
          docker exec \
            -w "$TERMUX_PROJECT_DIR" \
            "$TERMUX_CONTAINER_NAME" \
            /entrypoint.sh bash -lc "
              PATCHES_JSON='$PATCHES_JSON' \
              python scripts/main.py verify-version"

      - name: Collect diagnostics
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -Fxq "$TERMUX_CONTAINER_NAME"; then
            docker exec \
              -w "$TERMUX_PROJECT_DIR" \
              "$TERMUX_CONTAINER_NAME" \
              /entrypoint.sh bash -lc "
              PATCHES_JSON='$PATCHES_JSON'
              python scripts/main.py collect-env-snapshot --output '$TERMUX_ARTIFACT_DIR/env-snapshot.json' || true"
          fi

      - name: Copy diagnostics artifacts
        if: always()
        run: |
          mkdir -p "$HOST_ARTIFACT_DIR"
          if docker ps -a --format '{{.Names}}' | grep -Fxq "$TERMUX_CONTAINER_NAME"; then
            docker cp "$TERMUX_CONTAINER_NAME:$TERMUX_ARTIFACT_DIR/." "$HOST_ARTIFACT_DIR/" || true
          fi

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-diagnostics-${{ matrix.termux_target.ci_name }}
          path: ${{ env.HOST_ARTIFACT_DIR }}
          if-no-files-found: warn

      - name: Remove Termux Docker container
        if: always()
        run: |
          docker rm -f "$TERMUX_CONTAINER_NAME"
